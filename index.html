<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ราคาทองคำสมาคมฯ</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background: linear-gradient(180deg, #5b0000 0%, #2a0000 100%); 
            color: #FFD700; 
            font-family: 'Sarabun', sans-serif; 
            margin: 0; 
            padding: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            justify-content: center; 
            height: 100vh; 
            overflow: hidden; 
        }
        
        .header-title {
            font-size: 6vh;
            color: #FFFFFF;
            margin-bottom: 2vh;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            text-align: center;
            font-weight: bold;
        }

        .price-board { 
            background: rgba(0, 0, 0, 0.6); 
            padding: 4vh 5vw; 
            border-radius: 20px; 
            border: 3px solid #FFD700; 
            width: 85%; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .gold-type { 
            font-size: 5vh; 
            font-weight: bold;
            text-align: center;
            margin-top: 2vh; 
            border-bottom: 2px solid #FFD700; 
            padding-bottom: 1vh; 
            color: #FFF2B2;
        }

        .price-row { 
            display: flex; 
            justify-content: space-between; 
            margin-top: 3vh; 
            text-align: center;
        }

        .price-box {
            width: 45%;
        }

        .label { 
            font-size: 3vh; 
            color: #CCCCCC; 
            display: block;
            margin-bottom: 1vh;
        }

        .price-value {
            font-size: 7vh; 
            font-weight: bold;
            color: #00FF00; 
        }

        .update-time { 
            font-size: 2.5vh; 
            color: #AAAAAA; 
            margin-top: 5vh; 
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="header-title">ราคาทองตามประกาศสมาคมฯ</div>
    
    <div class="price-board">
        <div class="gold-type">ทองคำแท่ง 96.5%</div>
        <div class="price-row">
            <div class="price-box">
                <span class="label">รับซื้อ (บาท)</span>
                <span class="price-value" id="bar-buy">--</span>
            </div>
            <div class="price-box">
                <span class="label">ขายออก (บาท)</span>
                <span class="price-value" id="bar-sell">--</span>
            </div>
        </div>
        
        <div class="gold-type" style="margin-top: 6vh;">ทองรูปพรรณ 96.5%</div>
        <div class="price-row">
            <div class="price-box">
                <span class="label">รับซื้อ (บาท)</span>
                <span class="price-value" id="ornament-buy">--</span>
            </div>
            <div class="price-box">
                <span class="label">ขายออก (บาท)</span>
                <span class="price-value" id="ornament-sell">--</span>
            </div>
        </div>
    </div>

    <div class="update-time" id="update-time">อัปเดตข้อมูลล่าสุด: กำลังโหลด...</div>

    <script>
        async function fetchGoldPrice() {
            try {
                // ดึงข้อมูลผ่าน Public API ที่เสถียรที่สุด
                const response = await fetch('https://api.thaigold.info/v1/latest'); 
                const data = await response.json();
                
                if(data && data.response) {
                    const price = data.response.price;
                    
                    // ฟังก์ชันแปลงตัวเลขและใส่ลูกน้ำ
                    const formatNumber = (num) => {
                        if (!num || num === "") return "--";
                        const cleanNum = num.toString().replace(/,/g, '');
                        return Number(cleanNum).toLocaleString('th-TH');
                    };

                    document.getElementById('bar-buy').innerText = formatNumber(price.gold_bar.buy);
                    document.getElementById('bar-sell').innerText = formatNumber(price.gold_bar.sell);
                    
                    // รองรับโครงสร้างตัวแปรของทองรูปพรรณ (ป้องกัน API เปลี่ยนชื่อคีย์ในอนาคต)
                    const ornBuy = price.gold_jewelry ? price.gold_jewelry.buy : (price.gold ? price.gold.buy : "--");
                    const ornSell = price.gold_jewelry ? price.gold_jewelry.sell : (price.gold ? price.gold.sell : "--");
                    
                    document.getElementById('ornament-buy').innerText = formatNumber(ornBuy);
                    document.getElementById('ornament-sell').innerText = formatNumber(ornSell);
                    
                    const updateDate = data.response.date || data.response.update_date || "";
                    const updateTime = data.response.update_time || "";
                    document.getElementById('update-time').innerText = "อัปเดตข้อมูลล่าสุด: " + updateDate + " " + updateTime;
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('update-time').innerText = "สถานะ: รอการเชื่อมต่อข้อมูล API...";
            }
        }

        // โหลดข้อมูลทันที และรีเฟรชหน้าจอเองทุก 3 นาที
        fetchGoldPrice();
        setInterval(fetchGoldPrice, 180000); 
    </script>
</body>
</html>
