<script>
        async function fetchGoldPrice() {
            try {
                // เรียกใช้ API จากโปรเจกต์ GitHub
                const response = await fetch('https://api.chnwt.dev/thai-gold-api/latest'); 
                const data = await response.json();
                
                if(data && data.status === "success") {
                    const price = data.response.price;
                    
                    // เนื่องจาก API ตัวนี้ใส่ลูกน้ำ (,) มาให้แล้ว จึงจับใส่หน้าจอได้เลย
                    document.getElementById('bar-buy').innerText = price.gold_bar.buy;
                    document.getElementById('bar-sell').innerText = price.gold_bar.sell;
                    
                    // ทองรูปพรรณ ใน API ใช้ชื่อว่า gold
                    document.getElementById('ornament-buy').innerText = price.gold.buy;
                    document.getElementById('ornament-sell').innerText = price.gold.sell;
                    
                    // แสดงวันและเวลาอัปเดต
                    document.getElementById('update-time').innerText = 
                        "อัปเดตข้อมูลล่าสุด: " + data.response.update_date + " " + data.response.update_time;
                }
            } catch (error) {
                console.error('ไม่สามารถดึงข้อมูลราคาทองได้:', error);
                document.getElementById('update-time').innerText = "สถานะ: กำลังเชื่อมต่อ API...";
            }
        }

        // เรียกใช้งานทันที และตั้งเวลารีเฟรชทุก 3 นาที (180000 ms)
        fetchGoldPrice();
        setInterval(fetchGoldPrice, 180000); 
    </script>
